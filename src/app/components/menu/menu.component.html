<ion-menu side="start" menuId="main-menu" contentId="main-content">
  <ion-header>
    <ion-toolbar>
      <ion-title>Porttivo Admin</ion-title>
    </ion-toolbar>
  </ion-header>
  <ion-content>
    <ion-list>
      <ion-item button routerLink="/dashboard" routerDirection="root">
        <ion-icon name="home" slot="start"></ion-icon>
        <ion-label>Dashboard</ion-label>
      </ion-item>
      <ion-item button routerLink="/users" routerDirection="forward">
        <ion-icon name="people" slot="start"></ion-icon>
        <ion-label>User Management</ion-label>
      </ion-item>
      <ion-item button routerLink="/trips" routerDirection="forward">
        <ion-icon name="map" slot="start"></ion-icon>
        <ion-label>Trips</ion-label>
      </ion-item>
      <ion-item button routerLink="/vehicles" routerDirection="forward">
        <ion-icon name="bus" slot="start"></ion-icon>
        <ion-label>Vehicles</ion-label>
      </ion-item>
      <ion-item button routerLink="/fuel" routerDirection="forward">
        <ion-icon name="flame" slot="start"></ion-icon>
        <ion-label>Fuel Transactions</ion-label>
      </ion-item>
      <ion-item button routerLink="/fuel-cards" routerDirection="forward">
        <ion-icon name="card" slot="start"></ion-icon>
        <ion-label>Fuel Cards</ion-label>
      </ion-item>
      <ion-item button routerLink="/settlements" routerDirection="forward">
        <ion-icon name="cash" slot="start"></ion-icon>
        <ion-label>Settlements</ion-label>
      </ion-item>
      <ion-item button routerLink="/fraud" routerDirection="forward">
        <ion-icon name="shield" slot="start"></ion-icon>
        <ion-label>Fraud Detection</ion-label>
      </ion-item>
      <ion-item button routerLink="/analytics" routerDirection="forward">
        <ion-icon name="bar-chart" slot="start"></ion-icon>
        <ion-label>Analytics</ion-label>
      </ion-item>
      <ion-item button (click)="logout()">
        <ion-icon name="log-out" slot="start"></ion-icon>
        <ion-label>Logout</ion-label>
      </ion-item>
    </ion-list>
  </ion-content>
</ion-menu>
