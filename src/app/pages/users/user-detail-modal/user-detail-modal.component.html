<ion-header>
  <ion-toolbar>
    <ion-title>User Details</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="close()">Close</ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div *ngIf="loading" class="loading-container">
    <ion-spinner name="crescent"></ion-spinner>
  </div>

  <div *ngIf="!loading && user" class="user-details">
    <ion-list>
      <ion-item>
        <ion-label>
          <h2>Name</h2>
          <p>{{ user.name }}</p>
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-label>
          <h2>Mobile</h2>
          <p>{{ user.mobile }}</p>
        </ion-label>
      </ion-item>
      <ion-item *ngIf="user.email">
        <ion-label>
          <h2>Email</h2>
          <p>{{ user.email }}</p>
        </ion-label>
      </ion-item>
      <ion-item>
        <ion-label>
          <h2>Status</h2>
          <p>{{ user.status }}</p>
        </ion-label>
      </ion-item>
      <ion-item *ngIf="user.company">
        <ion-label>
          <h2>Company</h2>
          <p>{{ user.company }}</p>
        </ion-label>
      </ion-item>
      <ion-item *ngIf="user.pumpName">
        <ion-label>
          <h2>Pump Name</h2>
          <p>{{ user.pumpName }}</p>
        </ion-label>
      </ion-item>
      <ion-item *ngIf="user.walletBalance !== undefined">
        <ion-label>
          <h2>Wallet Balance</h2>
          <p>₹{{ user.walletBalance }}</p>
        </ion-label>
      </ion-item>
    </ion-list>
  </div>
</ion-content>
