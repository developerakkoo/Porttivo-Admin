<ion-content [fullscreen]="true" class="ion-padding">
<div class="trips-page page-container">
  <div class="page-header-section">
    <h1>Shipments / Trips</h1>
    <p>Manage and track all cargo shipments and container trips</p>
  </div>

  <div class="filter-bar">
    <input
      type="text"
      class="search-input"
      [(ngModel)]="filters.search"
      placeholder="Search trip ID, container, reference..."
      (keyup.enter)="applySearch()"
    />
    <select [(ngModel)]="filters.status" (change)="loadTrips()" class="filter-select">
      <option value="">All Status</option>
      <option value="BOOKED">Booked</option>
      <option value="ACCEPTED">Accepted</option>
      <option value="PLANNED">Planned</option>
      <option value="ACTIVE">Active</option>
      <option value="POD_PENDING">POD Pending</option>
      <option value="CLOSED_WITH_POD">Closed with POD</option>
      <option value="CLOSED_WITHOUT_POD">Closed without POD</option>
      <option value="CANCELLED">Cancelled</option>
    </select>
    <input type="date" [(ngModel)]="filters.startDate" (change)="loadTrips()" class="filter-input" />
    <input type="date" [(ngModel)]="filters.endDate" (change)="loadTrips()" class="filter-input" />
    <button class="btn-primary" (click)="loadTrips()">Apply</button>
  </div>

  <div class="table-card enterprise-card">
    <app-data-table
      [columns]="columns"
      [data]="trips"
      [loading]="loading"
      [sortKey]="filters.sort || 'createdAt'"
      [sortDir]="filters.sortDir || 'desc'"
      [page]="pagination.page || 1"
      [pages]="pagination.pages || 1"
      [total]="pagination.total || 0"
      [rowLinkFn]="rowLinkFn"
      [showPagination]="(pagination.pages || 1) > 1"
      (sortChange)="onSort($event)"
      (pageChange)="goToPage($event)"
    >
    </app-data-table>
  </div>
</div>
</ion-content>
