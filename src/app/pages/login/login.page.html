<ion-header [translucent]="false" class="login-header-bar">
  <ion-toolbar class="login-toolbar">
    <ion-title class="login-toolbar-title">Porttivo Admin</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="false" class="login-content">
  <div class="login-backdrop" aria-hidden="true"></div>
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <h1>Porttivo Admin</h1>
        <p>Sign in to your admin account</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="login()">
        <div class="form-field">
          <ion-input
            mode="md"
            fill="outline"
            label="Email"
            labelPlacement="stacked"
            type="email"
            formControlName="email"
            placeholder="admin@porttivo.com"
            required>
          </ion-input>
        </div>
        <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-message">
          Please enter a valid email address
        </div>

        <div class="form-field">
          <ion-input
            mode="md"
            fill="outline"
            label="Password"
            labelPlacement="stacked"
            type="password"
            formControlName="password"
            placeholder="Enter your password"
            required>
          </ion-input>
        </div>
        <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
          Password must be at least 6 characters
        </div>

        <button
          type="submit"
          class="btn-primary login-submit-btn"
          [disabled]="loginForm.invalid || isLoading"
        >
          <ion-spinner *ngIf="isLoading" name="crescent" class="login-submit-spinner"></ion-spinner>
          <span *ngIf="!isLoading">Sign In</span>
        </button>
      </form>
    </div>
  </div>
</ion-content>
