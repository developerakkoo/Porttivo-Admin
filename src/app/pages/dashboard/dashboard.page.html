<ion-content [fullscreen]="true" class="ion-padding">
<div class="dashboard-page page-container">
  <div class="page-header-section">
    <h1>Dashboard</h1>
    <p>Key metrics and activity across your logistics platform</p>
    <div class="date-filter-bar">
      <div class="date-inputs">
        <label class="label-text">Start</label>
        <input type="date" [(ngModel)]="startDate" (change)="applyDateFilter()" />
      </div>
      <div class="date-inputs">
        <label class="label-text">End</label>
        <input type="date" [(ngModel)]="endDate" (change)="applyDateFilter()" />
      </div>
      <button class="btn-primary" (click)="refresh()">
        <ion-icon name="refresh-outline"></ion-icon>
        Refresh
      </button>
    </div>
  </div>

  <div *ngIf="loading" class="loading-section">
    <app-skeleton-loader [rows]="4" [widths]="['25%', '25%', '25%', '25%']" [fullWidth]="true"></app-skeleton-loader>
  </div>

  <div *ngIf="!loading && stats" class="dashboard-content">
    <div class="stats-grid">
      <app-kpi-card [value]="stats.totalTransporters" label="Transporters" [sublabel]="stats.activeTransporters + ' active'" icon="people"></app-kpi-card>
      <app-kpi-card [value]="stats.totalDrivers" label="Drivers" [sublabel]="stats.activeDrivers + ' active'" icon="car"></app-kpi-card>
      <app-kpi-card [value]="stats.totalVehicles" label="Fleet" [sublabel]="stats.activeVehicles + ' active'" icon="cube"></app-kpi-card>
      <app-kpi-card [value]="stats.totalTrips" label="Total Trips" [sublabel]="stats.activeTrips + ' active'" icon="map"></app-kpi-card>
      <app-kpi-card [value]="'₹' + formatNumber(stats.totalFuelValue)" label="Fuel Value" [sublabel]="'₹' + formatNumber(stats.todayFuelValue) + ' today'" icon="flame"></app-kpi-card>
      <app-kpi-card [value]="stats.totalPumpOwners" label="Pump Owners" [sublabel]="stats.activePumpOwners + ' active'" icon="storefront"></app-kpi-card>
      <app-kpi-card *ngIf="stats.pendingSettlements > 0" [value]="stats.pendingSettlements" label="Pending Settlements" sublabel="Requires attention" icon="cash" [alert]="true"></app-kpi-card>
      <app-kpi-card *ngIf="stats.pendingFraudAlerts > 0" [value]="stats.pendingFraudAlerts" label="Fraud Alerts" sublabel="Needs review" icon="warning" [alert]="true"></app-kpi-card>
      <app-kpi-card *ngIf="stats.expiringDocuments > 0" [value]="stats.expiringDocuments" label="Expiring Docs" sublabel="Within 30 days" icon="document" [alert]="true"></app-kpi-card>
    </div>

    <div class="charts-row" *ngIf="!loading && chartData.labels && chartData.labels.length">
      <div class="chart-card enterprise-card">
        <h3 class="section-title">Trips Overview</h3>
        <div class="chart-container">
          <canvas baseChart
            [data]="chartData"
            [options]="chartOptions"
            type="line">
          </canvas>
        </div>
      </div>
    </div>

    <div class="recent-activities-section" *ngIf="!loading && recentActivities.length > 0">
      <h3 class="section-title">Recent Activity</h3>
      <div class="activity-list enterprise-card">
        <div *ngFor="let log of recentActivities" class="activity-item">
          <div class="activity-content">
            <span class="activity-action">{{ log.userType }} — {{ log.action }} {{ log.resource }}</span>
            <span class="activity-meta">{{ formatDate(log.createdAt) }}</span>
          </div>
          <app-status-badge [status]="log.result"></app-status-badge>
        </div>
      </div>
    </div>

    <app-empty-state *ngIf="!loading && !stats"
      icon="analytics-outline"
      title="No data"
      message="Dashboard metrics will appear once the system has activity."
    ></app-empty-state>
  </div>
</div>
</ion-content>
